<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <!-- 核心：通知搜索引擎和浏览器自动跳转 -->
    <meta http-equiv="refresh" content="0; url=https://gist.github.com/Ethan-a2">
    <script type="text/javascript">
        // 双重保险：使用 JS 立即跳转
        window.location.href = "https://gist.github.com/Ethan-a2";
    </script>
</head>
<body>
    <p>正在跳转到 Gist，如果未跳转请 <a href="https://gist.github.com/Ethan-a2">点击这里</a>。</p>
</body>
</html>
